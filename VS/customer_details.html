<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Details</title>
    <style>
         :root {
            --orange: #FF6600; /* Primary orange color */
            --dark-orange: #CC5200; /* Darker orange for hover */
            --light-grey: #F5F5F5; /* Light grey for background */
            --soft-beige: #FAF3E0; /* Soft beige for sections */
            --dark-charcoal: #333333; /* Dark color for text */
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--light-grey); /* Light grey background */
            margin: 0;
            padding: 20px;
        }
        .container {
            margin: 0 auto;
            max-width: 600px;
            padding: 20px;
            background-color: #f4f4f4;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-group textarea {
            height: 100px;
        }
        .form-group button {
            width: 100%;
            padding: 10px;
            background-color:#FF6600;;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        .form-group button:hover {
            background-color:var(--dark-orange);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .rules {
            margin-top: 20px;
        }
        .rules h3 {
            margin-bottom: 10px;
            color: var(--dark-charcoal)
        }
        .rules p {
            font-size: 14px;
            line-height: 1.6;
        }
        .rules ul {
            list-style-type: disc;
            margin-left: 20px; /* Indent for bullet points */
        }

        .rules li {
            font-size: 14px; /* Set font size for list items */
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Customer Details</h2>
    <form action="payment_details.html" method="POST">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required>
        </div>

        <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" name="address" required></textarea>
        </div>

        <h2>Rules and Regulations</h2>
        <div class="rules">
            <h3>Hotel Policies</h3>
            <p>By booking this hotel, you agree to the following terms:</p>
            <ul>
                <li>No smoking in rooms</li>
                <li>Check-in time is 3 PM and check-out time is 12 PM</li>
                <li>Pets are not allowed</li>
                <li>Full refund is available if canceled 48 hours prior to the stay</li>
            </ul>
        </div>

        <div class="form-group">
            <a href="payment_details.html"><button type="button">Proceed to Confirmation</button></a>
        </div>
    </form>
</div>

</body>
</html>
